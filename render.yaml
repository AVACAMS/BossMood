services:
  - type: web
    name: boss-mood-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    envVars:
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        sync: false
      - key: DB_PATH
        value: ./data/app.db
      - key: FRONTEND_URLS
        sync: false
    disk:
      name: boss-mood-tracker-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
